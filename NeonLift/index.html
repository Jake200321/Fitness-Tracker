<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#06070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NeonLift" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>NeonLift</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- HOME VIEW -->
    <main id="view-home" class="view active">
      <header class="app-header">
        <div class="logo">
          <span class="logo-mark">◆</span>
          <h1>Neon<span>Lift</span></h1>
        </div>
        <button id="settings-btn" class="icon-btn" aria-label="Settings">⚙</button>
      </header>

      <!-- Bodyweight hero -->
      <section class="card bw-card" id="bw-card">
        <div class="card-head">
          <div>
            <p class="card-label">Bodyweight</p>
            <p class="bw-current"><span id="bw-current">—</span><small id="bw-unit">kg</small></p>
            <p class="bw-delta" id="bw-delta"></p>
          </div>
          <button class="pill-btn" id="log-bw-btn">+ Log</button>
        </div>
        <div class="spark-wrap" id="bw-spark"></div>
      </section>

      <div class="section-head">
        <h2>Exercises</h2>
        <button class="pill-btn ghost" id="add-ex-btn">+ Add</button>
      </div>
      <section id="exercise-list" class="ex-list"></section>

      <p class="footer-note">All data is stored privately on this device.</p>
    </main>

    <!-- DETAIL VIEW -->
    <main id="view-detail" class="view">
      <header class="app-header">
        <button class="icon-btn" id="back-btn" aria-label="Back">‹</button>
        <h1 id="detail-title" class="detail-title">Exercise</h1>
        <button class="icon-btn" id="ex-menu-btn" aria-label="Options">⋯</button>
      </header>

      <section class="card chart-card">
        <div class="chart-head">
          <p class="card-label">Top set over time</p>
          <p class="chart-best" id="detail-best"></p>
        </div>
        <div id="detail-chart" class="chart-wrap"></div>
      </section>

      <button class="big-btn" id="log-session-btn">+ Log session</button>

      <div class="section-head"><h2>History</h2></div>
      <section id="history-list" class="history-list"></section>
    </main>
  </div>

  <!-- ===== Modals ===== -->
  <div class="modal-backdrop" id="modal-backdrop"></div>

  <!-- Log session modal -->
  <div class="modal" id="modal-session">
    <div class="modal-grip"></div>
    <h3 id="session-modal-title">Log session</h3>
    <label class="field">
      <span>Date</span>
      <input type="date" id="session-date" />
    </label>
    <p class="work-label">Working set</p>
    <div class="stepper-grid">
      <div class="stepper full" data-step="2.5" data-min="0">
        <span class="stepper-cap">Weight (<b class="unit-lbl">kg</b>)</span>
        <div class="stepper-ctl">
          <button class="dec" type="button" aria-label="Decrease weight">−</button>
          <input id="in-weight" type="number" inputmode="decimal" step="2.5" min="0" placeholder="0" />
          <button class="inc" type="button" aria-label="Increase weight">+</button>
        </div>
      </div>
      <div class="stepper" data-step="1" data-min="1">
        <span class="stepper-cap">Reps</span>
        <div class="stepper-ctl">
          <button class="dec" type="button" aria-label="Decrease reps">−</button>
          <input id="in-reps" type="number" inputmode="numeric" step="1" min="1" placeholder="5" />
          <button class="inc" type="button" aria-label="Increase reps">+</button>
        </div>
      </div>
      <div class="stepper" data-step="1" data-min="1">
        <span class="stepper-cap">Sets</span>
        <div class="stepper-ctl">
          <button class="dec" type="button" aria-label="Decrease sets">−</button>
          <input id="in-sets" type="number" inputmode="numeric" step="1" min="1" placeholder="3" />
          <button class="inc" type="button" aria-label="Increase sets">+</button>
        </div>
      </div>
    </div>
    <p class="work-preview" id="work-preview"></p>
    <div class="modal-actions">
      <button class="btn-secondary" data-close>Cancel</button>
      <button class="btn-primary" id="save-session-btn">Save</button>
    </div>
  </div>

  <!-- Log bodyweight modal -->
  <div class="modal" id="modal-bw">
    <div class="modal-grip"></div>
    <h3>Log bodyweight</h3>
    <label class="field">
      <span>Date</span>
      <input type="date" id="bw-date" />
    </label>
    <label class="field">
      <span>Weight (<b class="unit-lbl">kg</b>)</span>
      <input type="number" inputmode="decimal" step="0.1" id="bw-input" placeholder="0.0" />
    </label>
    <div class="modal-actions">
      <button class="btn-secondary" data-close>Cancel</button>
      <button class="btn-primary" id="save-bw-btn">Save</button>
    </div>
  </div>

  <!-- Add / edit exercise modal -->
  <div class="modal" id="modal-ex">
    <div class="modal-grip"></div>
    <h3 id="ex-modal-title">Add exercise</h3>
    <label class="field">
      <span>Name</span>
      <input type="text" id="ex-name" placeholder="e.g. Barbell Row" maxlength="40" />
    </label>
    <label class="field">
      <span>Accent colour</span>
      <div class="swatches" id="ex-swatches"></div>
    </label>
    <div class="modal-actions">
      <button class="btn-danger" id="delete-ex-btn" hidden>Delete</button>
      <button class="btn-secondary" data-close>Cancel</button>
      <button class="btn-primary" id="save-ex-btn">Save</button>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal" id="modal-settings">
    <div class="modal-grip"></div>
    <h3>Settings</h3>
    <label class="field">
      <span>Units</span>
      <div class="seg" id="unit-seg">
        <button data-unit="kg" class="active">kg</button>
        <button data-unit="lbs">lbs</button>
      </div>
    </label>
    <div class="data-actions">
      <button class="btn-secondary" id="export-btn">Export data</button>
      <button class="btn-secondary" id="import-btn">Import data</button>
      <input type="file" id="import-file" accept="application/json" hidden />
    </div>
    <button class="btn-danger wide" id="reset-btn">Erase all data</button>
    <div class="modal-actions">
      <button class="btn-primary" data-close>Done</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
